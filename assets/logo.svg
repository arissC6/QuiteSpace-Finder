<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="#F0F9F7" stroke="#9AC5BB" stroke-width="3"/>
  
  <!-- Peaceful Landscape -->
  <!-- Mountains -->
  <path d="M 30 120 L 70 60 L 110 90 L 150 40 L 170 120" fill="#B8E0DB" opacity="0.6"/>
  <path d="M 40 130 L 75 75 L 120 100 L 165 50 L 180 130" fill="#9AC5BB" opacity="0.4"/>
  
  <!-- Trees -->
  <g id="tree1" transform="translate(50, 95)">
    <rect x="-3" y="0" width="6" height="25" fill="#8DB8A0"/>
    <circle cx="0" cy="-8" r="18" fill="#A8D5C4"/>
  </g>
  
  <g id="tree2" transform="translate(140, 100)">
    <rect x="-2" y="0" width="4" height="20" fill="#8DB8A0"/>
    <circle cx="0" cy="-6" r="14" fill="#A8D5C4"/>
  </g>
  
  <!-- Park Bench -->
  <g id="bench" transform="translate(100, 120)">
    <!-- Seat -->
    <rect x="-20" y="-5" width="40" height="4" fill="#B8A98F" rx="2"/>
    <!-- Back -->
    <rect x="-18" y="-15" width="36" height="12" fill="#A89880" rx="1"/>
    <!-- Legs -->
    <rect x="-18" y="-2" width="3" height="15" fill="#8B7D6B"/>
    <rect x="15" y="-2" width="3" height="15" fill="#8B7D6B"/>
  </g>
  
  <!-- Pin/Location Marker -->
  <g id="pin" transform="translate(100, 65)">
    <!-- Pin point -->
    <path d="M 0 -15 C -5 -10 -8 -5 -8 0 C -8 6 -4 12 0 15 C 4 12 8 6 8 0 C 8 -5 5 -10 0 -15 Z" fill="#9AC5BB"/>
    <!-- Pin dot -->
    <circle cx="0" cy="-2" r="3" fill="#F0F9F7"/>
  </g>
  
  <!-- Decorative elements -->
  <!-- Small leaf -->
  <ellipse cx="75" cy="50" rx="4" ry="6" fill="#A8D5C4" opacity="0.7" transform="rotate(-30 75 50)"/>
  <ellipse cx="125" cy="55" rx="3" ry="5" fill="#A8D5C4" opacity="0.7" transform="rotate(30 125 55)"/>
  
  <!-- Zen circles (representing peace) -->
  <circle cx="35" cy="160" r="1.5" fill="#9AC5BB" opacity="0.5"/>
  <circle cx="47" cy="165" r="1" fill="#9AC5BB" opacity="0.4"/>
  <circle cx="155" cy="158" r="1.5" fill="#9AC5BB" opacity="0.5"/>
  <circle cx="168" cy="162" r="1" fill="#9AC5BB" opacity="0.4"/>
</svg>