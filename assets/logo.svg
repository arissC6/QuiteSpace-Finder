<?xml version="1.0" encoding="utf-8"?>
<!-- Pastel-mint relaxing logo: pin merged with a calm bench and tree silhouette -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400" role="img" aria-label="QuietSpace logo">
  <defs>
    <linearGradient id="gradMint" x1="0" x2="1">
      <stop offset="0" stop-color="#dff9f5" />
      <stop offset="1" stop-color="#bff1ea" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#9fb4c8" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#gradMint)" />

  <!-- pin shape -->
  <path d="M100 36c-16 0-28 12-28 28 0 18 28 52 28 52s28-34 28-52c0-16-12-28-28-28z" fill="#ffffff" filter="url(#softShadow)"/>
  <!-- inner pin cut -->
  <circle cx="100" cy="68" r="12" fill="#bff1ea" />

  <!-- small relaxing scene inside pin: bench + tree + person -->
  <g transform="translate(76,88) scale(0.8)">
    <!-- tree foliage (pastel mint variant) -->
    <ellipse cx="24" cy="-8" rx="20" ry="18" fill="#cdefe7" />
    <ellipse cx="10" cy="-4" rx="10" ry="9" fill="#dff7ef" opacity="0.95"/>

    <!-- trunk -->
    <rect x="22" y="-2" width="6" height="18" rx="2" fill="#bdb6c6" />

    <!-- bench -->
    <rect x="-6" y="20" width="44" height="6" rx="2" fill="#f5f1f3" />
    <rect x="-6" y="14" width="6" height="14" rx="1" fill="#c7d6d2" />
    <rect x="28" y="14" width="6" height="14" rx="1" fill="#c7d6d2" />

    <!-- person sitting with laptop (simplified) -->
    <circle cx="10" cy="6" r="6" fill="#fff3d9" />
    <rect x="4" y="10" width="12" height="10" rx="2" fill="#e7eff0" />
    <rect x="6" y="12" width="8" height="6" rx="1" fill="#c6e9e2" />
  </g>

  <!-- subtle outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#e8f7f4" stroke-width="4"/>
</svg>
