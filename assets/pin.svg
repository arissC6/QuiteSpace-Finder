<?xml version="1.0" encoding="utf-8"?>
<!-- Pastel-mint pin icon (transparent background) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 88" width="128" height="176" role="img" aria-label="Map pin icon">
  <defs>
    <linearGradient id="pinGrad" x1="0" x2="1">
      <stop offset="0" stop-color="#dff9f5"/>
      <stop offset="1" stop-color="#bff1ea"/>
    </linearGradient>
    <filter id="pinShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#9fb4c8" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- pin body -->
  <path d="M32 2C20.3 2 11 11.3 11 23c0 13 21 37 21 37s21-24 21-37C53 11.3 43.7 2 32 2z" fill="url(#pinGrad)" filter="url(#pinShadow)"/>
  <!-- center circle -->
  <circle cx="32" cy="23" r="8" fill="#ffffff" opacity="0.95" />
  <!-- small leaf icon inside center for calm motif -->
  <path d="M30 20c3-3 7-3 7-3s-4 3-7 6c-3 3-5 7-5 7s2-4 5-10z" fill="#bff1ea" opacity="0.95"/>
</svg>
